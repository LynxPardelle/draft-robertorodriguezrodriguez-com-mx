name: Guard PR source branch

on:
  pull_request:
    branches:
      - test
      - main

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce promotion graph
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          base="$BASE_REF"
          head="$HEAD_REF"
          if [[ "$base" == "test" && "$head" != "dev" ]]; then
            echo "PRs into test must come from dev. Got: $head"
            exit 1
          fi
          if [[ "$base" == "main" && "$head" != "test" ]]; then
            echo "PRs into main must come from test. Got: $head"
            exit 1
          fi
