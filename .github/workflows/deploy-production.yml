name: Deploy production draft

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: Validate production draft
    runs-on: ubuntu-latest
    outputs:
      draft_domain: ${{ steps.validate_draft.outputs.domain }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Verify protected target branch
        shell: bash
        env:
          CURRENT_REF: ${{ github.ref }}
          TARGET_REF: refs/heads/main
        run: |
          set -euo pipefail
          if [[ "$CURRENT_REF" != "$TARGET_REF" ]]; then
            echo "Production deploys must run from $TARGET_REF."
            exit 1
          fi

      - name: Verify exact test-to-main merged PR
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node tools/verify-promotion-commit.mjs --source=test --target=main

      - name: Validate production draft
        id: validate_draft
        shell: bash
        run: |
          set -euo pipefail
          draft_domain="$(node -e "process.stdout.write(JSON.parse(require('node:fs').readFileSync('draft-repo.config.json', 'utf8')).domain)")"
          node tools/deploy-draft.mjs --domain="$draft_domain" --draft-root=. --environment=production --validate-only=true
          printf 'domain=%s\n' "$draft_domain" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy validated production draft
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: draft-production-${{ github.repository }}
      cancel-in-progress: true
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Verify validated commit identity
        shell: bash
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Verify main is still the current target tip
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node tools/verify-promotion-commit.mjs --target=main --tip-only=true

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Deploy production draft
        run: node tools/deploy-draft.mjs --environment=production
        env:
          DRAFT_DOMAIN: ${{ needs.validate.outputs.draft_domain }}
          DRAFT_ROOT: .
          AUTHORING_ENDPOINT: ${{ vars.AUTHORING_ENDPOINT }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
